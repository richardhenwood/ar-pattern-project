<html>
  <head>
    <title>AR Pattern Project</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script>
        delete AFRAME.components["grabbable"];
    </script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.x/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/super-hands@^3.0.6/dist/super-hands.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
  </head>
  <body>

    <a-scene
        id="ascene"
        webxr="optionalFeatures: hit-test, bounded-floor; overlayElement: #overlay;"
        xr-mode-ui="XRMode: ar;" 
        background="color: #ECECEC"
        physics="debug: true" 
        obb-collider="showColliders: true">

        <a-entity meta-touch-controls="hand: left" left-thumbstick-logging></a-entity>
        <a-entity meta-touch-controls="hand: right" right-thumbstick-logging></a-entity>

        <a-assets id="my-assets">
            <img id="reference" src="reference_lengths.svg">
            <img id="loadedsvg" crossorigin="anonymous">
        </a-assets>
        
        <a-plane svgplane id="svgplane" 
                default="#reference" 
                src="#reference" 
                class='grabbable' 
                rotation="0 0 0"
                position="0 2 -2"
                material="side: double; transparent: true;"
                static-body ></a-plane>

        <a-camera>
            <a-cursor raycaster="objects: .clickable" cursor="rayOrigin: mouse"></a-cursor>
        </a-camera>
        
    </a-scene>

    <script>
        AFRAME.registerComponent('svgplane', {
            schema: {
                svgfile: {type: 'string'},
                width: {type: 'number', default: 1},
                height: {type: 'number', default: 1},
                px2m: {type: 'number', default: 0.0002645833} // convert pixel to meters
            },
            init: function () { },
            update: function () {
               const newsvg = document.querySelector('#loadedsvg');
                if (newsvg.src != "") {
                    const svgdom = document.querySelector('#svgplane');
                    try {
                        const vals = getSvgDimensions(newsvg.src);
                        vals.then(([w, h]) => {
                            this.el.setAttribute('width', w);
                            this.el.setAttribute('height', h);
                            this.el.setAttribute('src', "#loadedsvg");
                        });
                    } catch (error) {
                        console.error('failed fetching or parsing SVG:', error);
                    }
                }
            },
            applyTexture: function (img) {
                let mesh = this.el.getObject3D('mesh');
                if (!mesh) return;

                // Create the texture cleanly once the source is ready
                let texture = new THREE.Texture(img);
                mesh.material.map = texture;
                texture.needsUpdate = true; // Safe to call now
                console.log('loaded applytextur')
            }
        });

        AFRAME.registerComponent('left-thumbstick-logging', {
            init: function () {
                this.el.addEventListener('thumbstickmoved', this.onLeftThumbStickMoved.bind(this));
            },
            onLeftThumbStickMoved: function (evt) {
                const fudge = 0.007;
                const x = evt.detail.x;
                const y = evt.detail.y;
                if (Math.abs(x) > 0.10 || Math.abs(y) > 0.10) { 
                    let svgplane = document.querySelector('#svgplane');
                    let currentRotation = svgplane.getAttribute('position');
                    svgplane.setAttribute('position', {
                        x: currentRotation.x += (x * fudge) ** 1/2, // larger movements accelerate transform
                        y: currentRotation.y,
                        z: currentRotation.z += (y * fudge) ** 1/2
                    });
                }
            }
        });

        AFRAME.registerComponent('right-thumbstick-logging', {
            init: function () {
                this.el.addEventListener('thumbstickmoved', this.onRightThumbStickMoved.bind(this));
            },
            onRightThumbStickMoved: function (evt) {
                const xfudge = 0.1;
                const yfudge = 0.005;
                const x = evt.detail.x;
                const y = evt.detail.y;
                if (Math.abs(x) > 0.3) { 
                    let svgplane = document.querySelector('#svgplane');
                    let currentRotation = svgplane.getAttribute('rotation');
                    svgplane.setAttribute('rotation', {
                        x: currentRotation.x,
                        y: currentRotation.y -= (x * xfudge) ** 1/2,
                        z: currentRotation.z
                    });
                }
                else if (Math.abs(y) > 0.3) { 
                    if (Math.abs(y) > 0.9) { 
                        // accelerate extreme movemet
                        yfudge *= 0.1;
                    }
                    let svgplane = document.querySelector('#svgplane');
                    let currentRotation = svgplane.getAttribute('position');
                    svgplane.setAttribute('position', {
                        x: currentRotation.x,
                        y: currentRotation.y += (y * yfudge) ** 1/2,
                        z: currentRotation.z
                    });
                }
            }
        });

        function checkLastTwo(str, expected) {
            // Check if the string has at least two characters before slicing
            if (str.length >= 2) {
                return str.slice(-2) === expected;
            }
            return false; // Return false for strings shorter than 2 characters
        }
        async function getSvgDimensions(svgUrl) {
            try {
                const response = await fetch(svgUrl);
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                const svgString = await response.text();

                const parser = new DOMParser();
                const svgDoc = parser.parseFromString(svgString, 'image/svg+xml');
                const svgElement = svgDoc.documentElement;

                // Try to get width from 'width' attribute
                let width = svgElement.getAttribute('width');
                let height = svgElement.getAttribute('height');

                // If width attribute is missing, check viewBox
                if (!width) {
                    const viewBox = svgElement.getAttribute('viewBox');
                    if (viewBox) {
                        const parts = viewBox.split(' ');
                        // The third value in the viewBox is the width
                        width = parts[2];
                    }
                }

                console.log('Parsed SVG width, height:', width, height);
                if (checkLastTwo(width, 'mm') && checkLastTwo(height, 'mm')){
                    width = parseFloat(width.slice(0, -2)) / 1000;
                    height = parseFloat(height.slice(0, -2)) / 1000;

                    return [width, height];
                }
                alert("svg file does not have mm measurements in width or height")

            } catch (error) {
                console.error('Error fetching or parsing SVG:', error);
                return null;
            }
        }
        async function ____getSvgDimensions(svgUrl) {
            await fetch(svgUrl).then(response => {
                const svgString = response.text();

                const parser = new DOMParser();
                const svgDoc = parser.parseFromString(svgString, 'image/svg+xml');
                const svgElement = svgDoc.documentElement;

                // Try to get width from 'width' attribute
                let width = svgElement.getAttribute('width');
                let height = svgElement.getAttribute('height');

                // If width attribute is missing, check viewBox
                if (!width) {
                    const viewBox = svgElement.getAttribute('viewBox');
                    if (viewBox) {
                        const parts = viewBox.split(' ');
                        // The third value in the viewBox is the width
                        width = parts[2];
                    }
                }

                console.log('Parsed SVG width, height:', width, height);
                if (checkLastTwo(width, 'mm') && checkLastTwo(height, 'mm')){
                    width = parseFloat(width.slice(0, -2)) / 1000;
                    height = parseFloat(height.slice(0, -2)) / 1000;

                    return [width, height];
                }
                alert("svg file does not have mm measurements in width or height")
                return [null, null]
            })
            .catch(error => {
                // CORS blocks trigger this catch block
                console.error("Request failed:", error);

                // Fallback message to show your user
                alert("Unable to connect to the server. This may be due to a network issue or an unauthorized origin (CORS).");
            });
        }
    </script>

    <div id="overlay">
        <div id='orientation-selector'>Orientation
            <input type="radio" id="orien-h" name="tech" value="horizontal" onchange="orientationChange(this)" checked />
            <label for="html">Horizontal</label>
            <input type="radio" id="orien-v" name="tech" value="vertical" onchange="orientationChange(this)" />
            <label for="html">Vertial</label>
        </div>
        <div id='url-zone'>Provide a URL to your SVG
            <input type="text" id="url-input" placeholder="Enter file URL here" />
            <button id="submit-url" onclick="updateAframeAsset()">Submit URL</button>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('url-input');
        const submitUrlBtn = document.getElementById('submit-url');
        
        function orientationChange(radioButton) {
            console.log("Orientation switched to: " + radioButton.value);
            if (radioButton.value === 'horizontal') {
                const svgPlane = document.querySelector('#svgplane');
                svgPlane.setAttribute('rotation', {x: -90, y: 0, z: 0});
                svgPlane.setAttribute('position', {x: 0, y: 0, z: -1});
            }
            else {
                const svgPlane = document.querySelector('#svgplane');
                svgPlane.setAttribute('rotation', {x: 0, y: 0, z: 0});
                svgPlane.setAttribute('position', {x: 0, y: 2, z: -2});
                
            }

        }
        
        function updateSvgPlane() {
            const svgPlane = document.querySelector('#svgplane');
            svgPlane.setAttribute('svgplane', {svgfile: "#loadedsvg"});
        }
        
        function updateAframeAsset() {
            const url = document.querySelector(' #url-input').value;
            if (url) {
                console.log('got new svg to load', url)
                const newSvgAsset = document.querySelector('#loadedsvg');
                newSvgAsset.onload = updateSvgPlane;
                newSvgAsset.onerror = (event) => {
                // If the server lacks 'Access-Control-Allow-Origin: *', this fires.
                // Note: The event object still won't explicitly say "CORS", 
                // but it safely prevents a tainted canvas state.
                    alert("Loading failed. Possible CORS block?");
                };
                newSvgAsset.src = url;
            }
        }
    </script>
  </body>
</html>
